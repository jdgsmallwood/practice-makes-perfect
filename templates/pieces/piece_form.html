{% extends "base.html" %}
{% block title %}{{ action }} — Practice Makes Perfect{% endblock %}

{% block content %}
<div class="p-6 lg:p-8 max-w-lg mx-auto">

  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'pieces:piece_list' %}" class="text-gray-400 hover:text-white">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-xl font-bold text-white">{{ action }}</h1>
  </div>

  <form method="POST" class="space-y-5">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">
        Piece name <span class="text-red-400">*</span>
      </label>
      {{ form.name }}
      {% if form.name.errors %}
      <p class="mt-1 text-sm text-red-400">{{ form.name.errors.0 }}</p>
      {% endif %}
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Composer</label>
      {{ form.composer }}
    </div>

    <div class="flex items-center gap-3">
      {{ form.is_active }}
      <label class="text-sm font-medium text-gray-300">Active (include in practice pool)</label>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="flex-1 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors">
        {{ action }}
      </button>
      <a href="{% url 'pieces:piece_list' %}"
         class="px-5 py-3 rounded-xl bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium transition-colors">
        Cancel
      </a>
    </div>
  </form>

</div>
{% endblock %}
