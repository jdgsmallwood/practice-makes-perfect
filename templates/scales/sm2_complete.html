{% extends "base.html" %}
{% block title %}Scale SM-2 Complete — Practice Makes Perfect{% endblock %}
{% block content %}
<div class="p-8 max-w-lg mx-auto text-center">
  <div class="bg-green-900/30 border border-green-700/40 rounded-2xl p-8">
    <p class="text-2xl font-bold text-green-300 mb-2">Scale review done!</p>
    {% if next_due %}
    <p class="text-gray-400 mb-6">Next scale due: <span class="text-white">{{ next_due|date:"d M Y" }}</span></p>
    {% else %}
    <p class="text-gray-400 mb-6">No more scales scheduled.</p>
    {% endif %}
    <div class="flex gap-3 justify-center">
      <a href="{% url 'pieces:dashboard' %}"
         class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors">
        Dashboard
      </a>
      <a href="{% url 'scales:rotation_session' %}"
         class="bg-gray-800 hover:bg-gray-700 text-gray-200 font-semibold px-5 py-2.5 rounded-xl transition-colors">
        Rotation
      </a>
    </div>
  </div>
</div>
{% endblock %}
