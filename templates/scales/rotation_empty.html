{% extends "base.html" %}
{% block title %}Scales Rotation — Practice Makes Perfect{% endblock %}
{% block content %}
<div class="p-8 max-w-lg mx-auto text-center">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
    <p class="text-xl font-semibold text-white mb-2">No scales enabled</p>
    <p class="text-gray-400 mb-6">Toggle on some scale / key combinations to start a rotation.</p>
    <a href="{% url 'scales:settings' %}"
       class="inline-block bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors">
      Configure Scales
    </a>
  </div>
</div>
{% endblock %}
