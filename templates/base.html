{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}Practice Makes Perfect{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
  <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen" x-data>

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="hidden md:flex w-60 flex-shrink-0 flex-col bg-gray-900 border-r border-gray-800">
      <div class="p-5 border-b border-gray-800">
        <span class="text-lg font-bold tracking-tight text-white">Practice</span>
        <span class="text-indigo-400 text-lg font-bold"> ♪</span>
      </div>
      <nav class="flex-1 p-3 space-y-1">
        <a href="{% url 'pieces:dashboard' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                  {% if request.resolver_match.url_name == 'dashboard' %}bg-indigo-600 text-white{% else %}text-gray-400 hover:text-gray-100 hover:bg-gray-800{% endif %}">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Dashboard
        </a>
        <a href="{% url 'pieces:piece_list' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                  {% if 'piece' in request.resolver_match.url_name %}bg-indigo-600 text-white{% else %}text-gray-400 hover:text-gray-100 hover:bg-gray-800{% endif %}">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
          </svg>
          My Pieces
        </a>
        <a href="{% url 'practice:session' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                  {% if request.resolver_match.namespace == 'practice' %}bg-indigo-600 text-white{% else %}text-gray-400 hover:text-gray-100 hover:bg-gray-800{% endif %}">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Practice
        </a>
      </nav>
    </aside>

    <!-- Mobile top bar -->
    <div class="md:hidden fixed top-0 left-0 right-0 z-10 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-4 py-3">
      <span class="font-bold text-white">Practice <span class="text-indigo-400">♪</span></span>
      <div class="flex gap-3">
        <a href="{% url 'pieces:dashboard' %}" class="text-gray-400 hover:text-white p-1">Home</a>
        <a href="{% url 'pieces:piece_list' %}" class="text-gray-400 hover:text-white p-1">Pieces</a>
        <a href="{% url 'practice:session' %}" class="text-gray-400 hover:text-white p-1">Practice</a>
      </div>
    </div>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto pt-16 md:pt-0">
      {% if messages %}
      <div class="px-6 pt-4 space-y-2">
        {% for message in messages %}
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm
                    {% if message.tags == 'error' %}bg-red-900/40 text-red-300 border border-red-700/40
                    {% elif message.tags == 'success' %}bg-green-900/40 text-green-300 border border-green-700/40
                    {% else %}bg-gray-800 text-gray-300 border border-gray-700{% endif %}"
             x-data x-init="setTimeout(() => $el.remove(), 4000)">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>

  </div>

  <script src="{% static 'js/htmx.min.js' %}"></script>
  <script src="{% static 'js/alpine.min.js' %}" defer></script>
  <script>
    document.addEventListener("htmx:configRequest", (e) => {
      e.detail.headers["X-CSRFToken"] = document.querySelector('meta[name="csrf-token"]').content;
    });
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
