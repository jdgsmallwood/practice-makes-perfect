{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Login — Practice Makes Perfect</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <p class="text-3xl font-bold text-white">Practice <span class="text-indigo-400">♪</span></p>
      <p class="text-gray-400 mt-1 text-sm">Sign in to continue</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
      {% if form.errors %}
      <div class="bg-red-900/40 border border-red-700/40 text-red-300 text-sm rounded-xl px-4 py-3 mb-5">
        Invalid username or password.
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
            <input type="text" name="username" autofocus required
                   class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-gray-100 w-full focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                   autocomplete="username">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
            <input type="password" name="password" required
                   class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-gray-100 w-full focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                   autocomplete="current-password">
          </div>
        </div>

        <button type="submit"
                class="mt-6 w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors">
          Sign in
        </button>
      </form>
    </div>
  </div>

</body>
</html>
