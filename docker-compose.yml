services:
  web:
    build: .
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost}
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    # No host port — all traffic enters through nginx
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine   # multi-arch: pulls arm64 automatically on Pi
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro   # nginx serves uploaded images directly
    depends_on:
      - web

volumes:
  sqlite_data:
  media_data:
