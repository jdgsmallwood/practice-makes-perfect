services:

  web:
    build: .
    restart: unless-stopped
    container_name: practice-web
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    networks:
      - internal          # NOT in nginx-proxy network; only nginx reaches it
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine   # multi-arch; pulls arm64 on Raspberry Pi
    restart: unless-stopped
    container_name: practice-nginx
    networks:
      - nginx-proxy       # nginx-proxy discovers this container
      - internal          # can reach gunicorn
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro   # serve uploaded images without touching Python
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST:-practice.smallcaps.internal}
      - VIRTUAL_PORT=80
    depends_on:
      - web

volumes:
  sqlite_data:
  media_data:

networks:
  nginx-proxy:
    external: true
  internal:
    internal: true    # no outside access; only containers on this network can talk
