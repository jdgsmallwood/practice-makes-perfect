upstream gunicorn {
    server web:8000;
}

server {
    listen 80;
    server_name _;          # catch-all: works for IP address and any hostname

    client_max_body_size 20M;   # allow screenshot uploads up to 20 MB

    # Uploaded user media (screenshots) — served directly, bypasses gunicorn
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else (HTML pages, API, AND static files via WhiteNoise)
    location / {
        proxy_pass         http://gunicorn;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
