upstream gunicorn {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;   # must cover screenshot uploads

    # ---------------------------------------------------------------
    # Media files — served directly from the Docker volume.
    # This is the whole reason the nginx container exists: avoiding
    # a round-trip through Python/gunicorn for every image request.
    # ---------------------------------------------------------------
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---------------------------------------------------------------
    # Everything else (HTML, static assets via WhiteNoise, API calls)
    # ---------------------------------------------------------------
    location / {
        proxy_pass         http://gunicorn;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
